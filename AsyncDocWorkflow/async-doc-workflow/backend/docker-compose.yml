# version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - uploads:/app/uploads
    env_file: .env
    depends_on:
      - redis

  worker:
    build: .
    command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=4
    volumes:
      - .:/app
      - uploads:/app/uploads
    env_file: .env
    depends_on:
      - redis

volumes:
  uploads: